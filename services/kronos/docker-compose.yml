version: '3.8'

services:
  kronos:
    build:
      context: ..
      dockerfile: kronos/Dockerfile
    ports:
      - "8400:8400"
    environment:
      - KRONOS_MODEL=NeoQuasar/Kronos-small
      - KRONOS_TOKENIZER=NeoQuasar/Kronos-Tokenizer-base
      - KRONOS_MAX_CONTEXT=512
      - KRONOS_API_KEY=${KRONOS_API_KEY:-}
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8400/health"]
      interval: 30s
      timeout: 10s
      retries: 3
