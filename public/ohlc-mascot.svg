<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Body -->
  <rect x="55" y="110" width="90" height="80" rx="16" fill="#1A1A1A" stroke="#333" stroke-width="2"/>

  <!-- Chest circle (orange accent) -->
  <circle cx="100" cy="148" r="18" fill="#111" stroke="#FFA500" stroke-width="2.5"/>
  <circle cx="100" cy="148" r="8" fill="#FFA500" opacity="0.8"/>
  <circle cx="100" cy="148" r="4" fill="#FFD700"/>

  <!-- Head -->
  <rect x="45" y="40" width="110" height="75" rx="20" fill="#1A1A1A" stroke="#333" stroke-width="2"/>

  <!-- Screen/face area -->
  <rect x="55" y="50" width="90" height="52" rx="12" fill="#0A0A0A"/>

  <!-- Eyes (orange glowing dots) -->
  <circle cx="78" cy="76" r="8" fill="#FFA500"/>
  <circle cx="78" cy="76" r="4" fill="#FFD700"/>
  <circle cx="78" cy="73" r="2" fill="white" opacity="0.6"/>

  <circle cx="122" cy="76" r="8" fill="#FFA500"/>
  <circle cx="122" cy="76" r="4" fill="#FFD700"/>
  <circle cx="122" cy="73" r="2" fill="white" opacity="0.6"/>

  <!-- Smile -->
  <path d="M85 88 Q100 96 115 88" stroke="#FFA500" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Antenna -->
  <line x1="100" y1="40" x2="100" y2="18" stroke="#444" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="14" r="6" fill="#FFA500"/>
  <circle cx="100" cy="14" r="3" fill="#FFD700"/>

  <!-- Ears/side panels -->
  <rect x="32" y="58" width="14" height="30" rx="5" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
  <rect x="35" y="65" width="8" height="4" rx="2" fill="#FFA500" opacity="0.5"/>
  <rect x="35" y="73" width="8" height="4" rx="2" fill="#FFA500" opacity="0.3"/>

  <rect x="154" y="58" width="14" height="30" rx="5" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
  <rect x="157" y="65" width="8" height="4" rx="2" fill="#FFA500" opacity="0.5"/>
  <rect x="157" y="73" width="8" height="4" rx="2" fill="#FFA500" opacity="0.3"/>

  <!-- Arms -->
  <rect x="30" y="120" width="22" height="50" rx="10" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
  <circle cx="41" cy="172" r="8" fill="#222" stroke="#444" stroke-width="1.5"/>

  <rect x="148" y="120" width="22" height="50" rx="10" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
  <circle cx="159" cy="172" r="8" fill="#222" stroke="#444" stroke-width="1.5"/>

  <!-- Legs -->
  <rect x="65" y="188" width="24" height="35" rx="8" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
  <rect x="60" y="218" width="34" height="14" rx="6" fill="#222" stroke="#444" stroke-width="1.5"/>

  <rect x="111" y="188" width="24" height="35" rx="8" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
  <rect x="106" y="218" width="34" height="14" rx="6" fill="#222" stroke="#444" stroke-width="1.5"/>

  <!-- Glow effect behind eyes -->
  <circle cx="78" cy="76" r="12" fill="#FFA500" opacity="0.15"/>
  <circle cx="122" cy="76" r="12" fill="#FFA500" opacity="0.15"/>

  <!-- Antenna glow -->
  <circle cx="100" cy="14" r="10" fill="#FFA500" opacity="0.1"/>
</svg>
