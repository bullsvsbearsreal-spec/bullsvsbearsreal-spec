<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:20px">
<div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; height:100%; align-items:end">
  <div style="text-align:center"><div style="height:80px; background:linear-gradient(135deg,var(--hub-accent-light),var(--hub-accent-secondary)); border-radius:6px; margin-bottom:10px"></div><div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-default)">6px</div><div style="font-size:10px; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">radius-sm</div><div style="font-size:10px; color:var(--fg-subtle)">Badges · pills</div></div>
  <div style="text-align:center"><div style="height:80px; background:linear-gradient(135deg,var(--hub-accent-light),var(--hub-accent-secondary)); border-radius:8px; margin-bottom:10px"></div><div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-default)">8px</div><div style="font-size:10px; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">radius-md</div><div style="font-size:10px; color:var(--fg-subtle)">Small cards · chips</div></div>
  <div style="text-align:center"><div style="height:80px; background:linear-gradient(135deg,var(--hub-accent-light),var(--hub-accent-secondary)); border-radius:12px; margin-bottom:10px"></div><div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-default)">12px</div><div style="font-size:10px; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">radius-lg</div><div style="font-size:10px; color:var(--fg-subtle)">Default card</div></div>
  <div style="text-align:center"><div style="height:80px; background:linear-gradient(135deg,var(--hub-accent-light),var(--hub-accent-secondary)); border-radius:16px; margin-bottom:10px"></div><div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-default)">16px</div><div style="font-size:10px; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">radius-xl</div><div style="font-size:10px; color:var(--fg-subtle)">Hero · premium</div></div>
  <div style="text-align:center"><div style="height:80px; width:80px; margin:0 auto; background:linear-gradient(135deg,var(--hub-accent-light),var(--hub-accent-secondary)); border-radius:999px; margin-bottom:10px"></div><div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-default)">999px</div><div style="font-size:10px; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">pill</div><div style="font-size:10px; color:var(--fg-subtle)">Live dots only</div></div>
</div>
</body></html>
