<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:20px">
<div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; height:100%; align-items:stretch">
  <div style="background:var(--hub-darker); border:1px solid var(--hub-border-subtle); border-radius:12px; padding:14px; display:flex; flex-direction:column; justify-content:center; gap:6px">
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted)">rgba(255,255,255,0.04)</div>
    <div style="font-size:14px; font-weight:700; color:var(--fg-default)">border-subtle</div>
    <div style="font-size:11px; color:var(--fg-subtle); line-height:1.5">Grid lines · row dividers · chart axes</div>
  </div>
  <div style="background:var(--hub-darker); border:1px solid var(--hub-border); border-radius:12px; padding:14px; display:flex; flex-direction:column; justify-content:center; gap:6px">
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted)">rgba(255,255,255,0.07)</div>
    <div style="font-size:14px; font-weight:700; color:var(--fg-default)">border (default)</div>
    <div style="font-size:11px; color:var(--fg-subtle); line-height:1.5">Cards at rest · inputs · buttons</div>
  </div>
  <div style="background:var(--hub-darker); border:1px solid var(--hub-border-hover); border-radius:12px; padding:14px; display:flex; flex-direction:column; justify-content:center; gap:6px; box-shadow:0 2px 12px rgba(0,0,0,.3)">
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted)">rgba(255,255,255,0.14)</div>
    <div style="font-size:14px; font-weight:700; color:var(--fg-default)">border-hover</div>
    <div style="font-size:11px; color:var(--fg-subtle); line-height:1.5">Hover · focus · selected states</div>
  </div>
</div>
</body></html>
