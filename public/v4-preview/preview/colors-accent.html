<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:18px">
<div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; height:100%">
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--hub-accent-light); border-radius:10px; min-height:120px; box-shadow:0 0 24px rgb(255 215 0 / .2)"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-default)">#FFD700</div>
    <div style="font-size:10px; font-weight:700; color:var(--fg-muted); letter-spacing:.12em; text-transform:uppercase">accent-light</div>
    <div style="font-size:10px; color:var(--fg-subtle)">Gold · hover glow</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--hub-accent); border-radius:10px; min-height:120px; box-shadow:0 0 24px rgb(255 165 0 / .3)"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-default)">#FFA500</div>
    <div style="font-size:10px; font-weight:700; color:var(--hub-accent); letter-spacing:.12em; text-transform:uppercase">accent ★</div>
    <div style="font-size:10px; color:var(--fg-subtle)">Primary · the brand</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--hub-accent-dark); border-radius:10px; min-height:120px"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-default)">#FF8C00</div>
    <div style="font-size:10px; font-weight:700; color:var(--fg-muted); letter-spacing:.12em; text-transform:uppercase">accent-dark</div>
    <div style="font-size:10px; color:var(--fg-subtle)">Gradient mid</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--hub-accent-secondary); border-radius:10px; min-height:120px"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-default)">#FF6B00</div>
    <div style="font-size:10px; font-weight:700; color:var(--fg-muted); letter-spacing:.12em; text-transform:uppercase">accent-secondary</div>
    <div style="font-size:10px; color:var(--fg-subtle)">Gradient endpoint</div>
  </div>
</div>
</body></html>
