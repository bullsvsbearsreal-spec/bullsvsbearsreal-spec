<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:18px">
<div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; height:calc(100% - 0px)">
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--hub-black); border:1px solid var(--hub-border); border-radius:10px; position:relative; min-height:120px">
      <span style="position:absolute; top:10px; left:10px; font-family:var(--font-mono); font-size:11px; color:var(--fg-muted)">#07090D</span>
    </div>
    <div style="font-size:11px; font-weight:700; color:var(--fg-muted); letter-spacing:.1em; text-transform:uppercase">hub-black</div>
    <div style="font-size:11px; color:var(--fg-subtle)">Body · deepest surface</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--hub-dark); border:1px solid var(--hub-border); border-radius:10px; position:relative; min-height:120px">
      <span style="position:absolute; top:10px; left:10px; font-family:var(--font-mono); font-size:11px; color:var(--fg-muted)">#10131A</span>
    </div>
    <div style="font-size:11px; font-weight:700; color:var(--fg-muted); letter-spacing:.1em; text-transform:uppercase">hub-dark</div>
    <div style="font-size:11px; color:var(--fg-subtle)">Navbar · footer</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--hub-darker); border:1px solid var(--hub-border); border-radius:10px; position:relative; min-height:120px">
      <span style="position:absolute; top:10px; left:10px; font-family:var(--font-mono); font-size:11px; color:var(--fg-muted)">#1B1F2B</span>
    </div>
    <div style="font-size:11px; font-weight:700; color:var(--fg-muted); letter-spacing:.1em; text-transform:uppercase">hub-darker</div>
    <div style="font-size:11px; color:var(--fg-subtle)">Primary card bg</div>
  </div>
</div>
</body></html>
