<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:24px">
<div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:24px; height:100%; align-items:center">
  <div style="text-align:center">
    <div style="height:110px; background:var(--hub-darker); border:1px solid var(--hub-border); border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.3)"></div>
    <div style="margin-top:10px; font-size:11px; color:var(--fg-default); font-weight:600">shadow-card</div>
    <div style="font-size:10px; color:var(--fg-subtle); font-family:var(--font-mono)">1px 3px / 8px 24px</div>
  </div>
  <div style="text-align:center">
    <div style="height:110px; background:var(--hub-darker); border:1px solid var(--hub-accent); border-radius:12px; box-shadow:0 0 16px rgb(255 165 0 / .25)"></div>
    <div style="margin-top:10px; font-size:11px; color:var(--fg-default); font-weight:600">accent-glow</div>
    <div style="font-size:10px; color:var(--fg-subtle); font-family:var(--font-mono)">16px / rgb 255 165 0 / .25</div>
  </div>
  <div style="text-align:center">
    <div style="height:110px; background:var(--hub-secondary); border:1px solid var(--hub-border); border-radius:12px; box-shadow:0 25px 50px -12px rgba(0,0,0,.6), 0 10px 20px rgba(0,0,0,.4)"></div>
    <div style="margin-top:10px; font-size:11px; color:var(--fg-default); font-weight:600">shadow-dropdown</div>
    <div style="font-size:10px; color:var(--fg-subtle); font-family:var(--font-mono)">shadow-2xl / black 60%</div>
  </div>
</div>
</body></html>
