<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:18px">
<div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; height:100%">
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--hub-secondary); border:1px solid var(--hub-border); border-radius:10px; position:relative; min-height:120px">
      <span style="position:absolute; top:10px; left:10px; font-family:var(--font-mono); font-size:11px; color:var(--fg-muted)">#242938</span>
    </div>
    <div style="font-size:11px; font-weight:700; color:var(--fg-muted); letter-spacing:.1em; text-transform:uppercase">secondary</div>
    <div style="font-size:11px; color:var(--fg-subtle)">Input fill · tooltips</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--hub-secondary-light); border:1px solid var(--hub-border); border-radius:10px; position:relative; min-height:120px">
      <span style="position:absolute; top:10px; left:10px; font-family:var(--font-mono); font-size:11px; color:var(--fg-muted)">#2D3245</span>
    </div>
    <div style="font-size:11px; font-weight:700; color:var(--fg-muted); letter-spacing:.1em; text-transform:uppercase">secondary-light</div>
    <div style="font-size:11px; color:var(--fg-subtle)">Hover fill</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--hub-secondary-medium); border:1px solid var(--hub-border); border-radius:10px; position:relative; min-height:120px">
      <span style="position:absolute; top:10px; left:10px; font-family:var(--font-mono); font-size:11px; color:var(--fg-muted)">#363C51</span>
    </div>
    <div style="font-size:11px; font-weight:700; color:var(--fg-muted); letter-spacing:.1em; text-transform:uppercase">secondary-medium</div>
    <div style="font-size:11px; color:var(--fg-subtle)">Selected · pressed</div>
  </div>
</div>
</body></html>
