<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:18px">
<div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:14px; height:100%">
  <div style="background:var(--hub-darker); border:1px solid var(--hub-border); border-radius:12px; padding:14px; display:flex; flex-direction:column; gap:10px">
    <div style="display:flex; align-items:center; gap:10px">
      <div style="width:36px; height:36px; border-radius:10px; background:var(--hub-ai); box-shadow:0 0 18px rgb(179 136 255 / .3)"></div>
      <div>
        <div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-default); font-weight:600">#B388FF</div>
        <div style="font-size:10px; color:var(--fg-subtle); text-transform:uppercase; letter-spacing:.12em">hub-ai</div>
      </div>
    </div>
    <div style="font-size:11px; color:var(--fg-muted); line-height:1.5">Reserved for <strong style="color:var(--hub-ai)">Hub AI</strong> chat, smart alerts, AI-generated commentary. Never used for anything else.</div>
  </div>
  <div style="background:var(--hub-darker); border:1px solid var(--hub-border); border-radius:12px; padding:14px; display:flex; flex-direction:column; gap:10px">
    <div style="display:flex; align-items:center; gap:10px">
      <div style="width:36px; height:36px; border-radius:10px; background:var(--hub-info)"></div>
      <div>
        <div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-default); font-weight:600">#60A5FA</div>
        <div style="font-size:10px; color:var(--fg-subtle); text-transform:uppercase; letter-spacing:.12em">hub-info</div>
      </div>
    </div>
    <div style="font-size:11px; color:var(--fg-muted); line-height:1.5">Neutral info highlights — news categories, educational tooltips, non-directional callouts.</div>
  </div>
</div>
</body></html>
