<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:20px">
<div style="display:flex; flex-direction:column; gap:10px; justify-content:center; height:100%">
  <div style="display:flex; gap:10px">
    <div style="flex:1; position:relative">
      <input placeholder="Search coins, exchanges…" style="width:100%; background:var(--hub-darker); color:var(--fg-default); font-family:var(--font-sans); font-size:13px; border:1px solid var(--hub-border); border-radius:8px; padding:9px 12px 9px 34px; outline:none"/>
      <span style="position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--fg-subtle); font-size:14px">⌕</span>
      <span style="position:absolute; right:10px; top:50%; transform:translateY(-50%); font-family:var(--font-mono); font-size:10px; color:var(--fg-subtle); background:var(--hub-secondary); padding:2px 6px; border-radius:4px; border:1px solid var(--hub-border)">⌘K</span>
    </div>
    <input value="BTC/USDT" style="width:120px; background:var(--hub-darker); color:var(--fg-default); font-family:var(--font-mono); font-size:13px; border:1px solid var(--hub-accent); border-radius:8px; padding:9px 12px; outline:none; box-shadow:0 0 0 3px rgb(255 165 0 / .12)"/>
  </div>
  <div style="display:flex; gap:10px; align-items:center">
    <div style="display:flex; background:var(--hub-darker); border:1px solid var(--hub-border); border-radius:8px; padding:3px">
      <button style="background:var(--hub-secondary-medium); color:var(--fg-default); font-family:var(--font-sans); font-weight:600; font-size:12px; border:none; padding:5px 12px; border-radius:6px">CEX</button>
      <button style="background:transparent; color:var(--fg-muted); font-family:var(--font-sans); font-weight:500; font-size:12px; border:none; padding:5px 12px; border-radius:6px">DEX</button>
      <button style="background:transparent; color:var(--fg-muted); font-family:var(--font-sans); font-weight:500; font-size:12px; border:none; padding:5px 12px; border-radius:6px">All</button>
    </div>
    <div style="display:flex; align-items:center; gap:7px; padding:7px 11px; background:var(--hub-darker); border:1px solid var(--hub-border); border-radius:8px">
      <span style="width:34px; height:18px; background:var(--hub-accent); border-radius:999px; position:relative"><span style="position:absolute; right:2px; top:2px; width:14px; height:14px; background:#07090d; border-radius:999px"></span></span>
      <span style="font-size:12px; color:var(--fg-default); font-weight:500">Aggregate exchanges</span>
    </div>
    <select style="background:var(--hub-darker); color:var(--fg-default); font-family:var(--font-sans); font-size:12px; border:1px solid var(--hub-border); border-radius:8px; padding:7px 28px 7px 11px; outline:none">
      <option>Sort: Volume ↓</option>
    </select>
  </div>
</div>
</body></html>
