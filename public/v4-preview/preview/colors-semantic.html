<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:18px">
<div style="display:grid; grid-template-columns:repeat(3, 1fr) 1px repeat(3, 1fr); gap:10px; height:100%; align-items:stretch">
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--pump-mild); border-radius:10px; min-height:100px"></div>
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-default)">#4ADE80</div>
    <div style="font-size:10px; font-weight:700; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">pump-mild</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--pump-hot); border-radius:10px; min-height:100px"></div>
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-default)">#34D399</div>
    <div style="font-size:10px; font-weight:700; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">pump-hot</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--pump-nuclear); border-radius:10px; min-height:100px"></div>
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-default)">#22D38A</div>
    <div style="font-size:10px; font-weight:700; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">pump-nuclear</div>
  </div>
  <div style="background:var(--hub-border)"></div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--rekt-mild); border-radius:10px; min-height:100px"></div>
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-default)">#F87171</div>
    <div style="font-size:10px; font-weight:700; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">rekt-mild</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--rekt-hot); border-radius:10px; min-height:100px"></div>
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-default)">#EF5464</div>
    <div style="font-size:10px; font-weight:700; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">rekt-hot</div>
  </div>
  <div style="display:flex; flex-direction:column; gap:6px">
    <div style="flex:1; background:var(--rekt-nuclear); border-radius:10px; min-height:100px"></div>
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-default)">#E63946</div>
    <div style="font-size:10px; font-weight:700; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.1em">rekt-nuclear</div>
  </div>
</div>
</body></html>
