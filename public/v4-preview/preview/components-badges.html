<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:20px">
<div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center; height:100%">
  <span style="background:rgb(74 222 128 / .12); color:var(--pump-mild); font-family:var(--font-mono); font-weight:700; font-size:11px; border:1px solid rgb(74 222 128 / .22); padding:3px 8px; border-radius:4px; letter-spacing:-.01em">+2.41%</span>
  <span style="background:rgb(248 113 113 / .12); color:var(--rekt-mild); font-family:var(--font-mono); font-weight:700; font-size:11px; border:1px solid rgb(248 113 113 / .22); padding:3px 8px; border-radius:4px">-1.02%</span>
  <span style="background:rgb(255 165 0 / .12); color:var(--hub-accent); font-family:var(--font-sans); font-weight:700; font-size:10px; border:1px solid rgb(255 165 0 / .25); padding:3px 7px; border-radius:999px; text-transform:uppercase; letter-spacing:.08em">PRO</span>
  <span style="background:rgb(179 136 255 / .12); color:var(--hub-ai); font-family:var(--font-sans); font-weight:700; font-size:10px; border:1px solid rgb(179 136 255 / .25); padding:3px 7px; border-radius:999px; text-transform:uppercase; letter-spacing:.08em">AI</span>
  <span style="background:var(--hub-secondary); color:var(--fg-muted); font-family:var(--font-mono); font-size:11px; border:1px solid var(--hub-border); padding:3px 8px; border-radius:4px">CEX</span>
  <span style="background:var(--hub-secondary); color:var(--fg-muted); font-family:var(--font-mono); font-size:11px; border:1px solid var(--hub-border); padding:3px 8px; border-radius:4px">DEX</span>
  <span style="display:inline-flex; align-items:center; gap:5px; background:rgba(74,222,128,.08); color:var(--pump-mild); font-family:var(--font-sans); font-weight:600; font-size:10px; border:1px solid rgba(74,222,128,.2); padding:3px 8px; border-radius:999px; text-transform:uppercase; letter-spacing:.08em"><span style="width:6px; height:6px; background:var(--pump-mild); border-radius:999px; box-shadow:0 0 6px var(--pump-mild)"></span>LIVE</span>
  <span style="display:inline-flex; align-items:center; gap:5px; background:var(--hub-secondary); color:var(--fg-subtle); font-family:var(--font-sans); font-weight:600; font-size:10px; border:1px solid var(--hub-border); padding:3px 8px; border-radius:999px; text-transform:uppercase; letter-spacing:.08em"><span style="width:6px; height:6px; background:var(--fg-subtle); border-radius:999px"></span>STALE</span>
  <span style="background:#000; color:var(--hub-accent-light); font-family:var(--font-mono); font-weight:700; font-size:10px; border:1px solid var(--hub-accent); padding:3px 8px; border-radius:4px; letter-spacing:.05em">🔥 FUNDING APOCALYPSE</span>
  <span style="background:rgb(230 57 70 / .15); color:var(--rekt-nuclear); font-family:var(--font-mono); font-weight:800; font-size:11px; border:1px solid rgb(230 57 70 / .4); padding:3px 8px; border-radius:4px; text-transform:uppercase; letter-spacing:.08em">REKT</span>
  <span style="background:rgb(34 211 138 / .15); color:var(--pump-nuclear); font-family:var(--font-mono); font-weight:800; font-size:11px; border:1px solid rgb(34 211 138 / .4); padding:3px 8px; border-radius:4px; text-transform:uppercase; letter-spacing:.08em">PUMP</span>
