<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:20px">
<div style="display:flex; flex-direction:column; gap:12px; justify-content:center; height:100%">
  <div style="display:flex; gap:10px; align-items:center">
    <button style="background:linear-gradient(135deg,#FFB800,#FF8C00); color:#07090d; font-family:var(--font-sans); font-weight:700; font-size:13px; border:none; padding:9px 18px; border-radius:8px; cursor:pointer; box-shadow:0 0 16px rgb(255 165 0 / .25); letter-spacing:-.005em">Open Terminal</button>
    <button style="background:var(--hub-secondary); color:var(--fg-default); font-family:var(--font-sans); font-weight:600; font-size:13px; border:1px solid var(--hub-border); padding:9px 16px; border-radius:8px; cursor:pointer">Secondary</button>
    <button style="background:transparent; color:var(--fg-muted); font-family:var(--font-sans); font-weight:500; font-size:13px; border:1px solid var(--hub-border); padding:9px 14px; border-radius:8px; cursor:pointer">Ghost</button>
    <button style="background:transparent; color:var(--hub-accent); font-family:var(--font-sans); font-weight:600; font-size:13px; border:none; padding:9px 6px; cursor:pointer">View all →</button>
  </div>
  <div style="display:flex; gap:10px; align-items:center">
    <button style="background:rgb(74 222 128 / .12); color:var(--pump-mild); font-family:var(--font-sans); font-weight:700; font-size:12px; border:1px solid rgb(74 222 128 / .25); padding:7px 12px; border-radius:6px">BUY</button>
    <button style="background:rgb(248 113 113 / .12); color:var(--rekt-mild); font-family:var(--font-sans); font-weight:700; font-size:12px; border:1px solid rgb(248 113 113 / .25); padding:7px 12px; border-radius:6px">SELL</button>
    <button style="background:var(--hub-secondary-light); color:var(--fg-default); font-family:var(--font-mono); font-weight:600; font-size:11px; border:1px solid var(--hub-border); padding:6px 10px; border-radius:6px">1h</button>
    <button style="background:var(--hub-accent); color:#07090d; font-family:var(--font-mono); font-weight:700; font-size:11px; border:none; padding:6px 10px; border-radius:6px">4h</button>
    <button style="background:transparent; color:var(--fg-muted); font-family:var(--font-mono); font-weight:500; font-size:11px; border:1px solid var(--hub-border); padding:6px 10px; border-radius:6px">1d</button>
    <button style="background:transparent; color:var(--fg-muted); font-family:var(--font-mono); font-weight:500; font-size:11px; border:1px solid var(--hub-border); padding:6px 10px; border-radius:6px">1w</button>
  </div>
</div>
</body></html>
