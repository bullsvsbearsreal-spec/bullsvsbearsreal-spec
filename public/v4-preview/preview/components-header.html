<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:0; overflow:hidden">
<div style="height:100%; display:flex; flex-direction:column">
<div style="height:48px; background:rgba(7,9,13,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--hub-border); display:flex; align-items:center; padding:0 20px; gap:22px">
  <div style="display:flex; align-items:center; gap:2px; font-family:var(--font-sans); font-size:18px; font-weight:800; letter-spacing:-.02em">
    <span style="color:var(--fg-default)">Info</span>
    <span style="background:linear-gradient(135deg,#FFB800,#FF8C00); color:#07090d; padding:2px 8px; border-radius:6px">Hub</span>
  </div>
  <nav style="display:flex; gap:18px; font-size:13px; font-weight:500">
    <a style="color:var(--hub-accent); text-decoration:none; position:relative">Funding <span style="position:absolute; left:0; right:0; bottom:-16px; height:2px; background:var(--hub-accent)"></span></a>
    <a style="color:var(--fg-muted); text-decoration:none">Open Interest</a>
    <a style="color:var(--fg-muted); text-decoration:none">Liquidations</a>
    <a style="color:var(--fg-muted); text-decoration:none">Screener</a>
    <a style="color:var(--fg-muted); text-decoration:none">Chart</a>
    <a style="color:var(--fg-muted); text-decoration:none">Options</a>
  </nav>
  <div style="flex:1"></div>
  <div style="background:var(--hub-darker); border:1px solid var(--hub-border); border-radius:8px; padding:6px 10px; font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle); display:flex; align-items:center; gap:6px">Search… <span style="background:var(--hub-secondary); padding:1px 5px; border-radius:3px; font-size:9px; color:var(--fg-muted)">⌘K</span></div>
  <button style="background:linear-gradient(135deg,#FFB800,#FF8C00); color:#07090d; font-weight:700; font-size:12px; border:none; padding:7px 14px; border-radius:7px; font-family:var(--font-sans)">Sign in</button>
</div>
<div style="height:28px; background:rgba(10,10,10,.92); border-bottom:1px solid var(--hub-border-subtle); display:flex; align-items:center; padding:0 16px; gap:22px; overflow:hidden; font-family:var(--font-mono); font-size:11px">
  <span style="color:var(--fg-subtle); font-weight:700; text-transform:uppercase; letter-spacing:.1em; font-family:var(--font-sans); font-size:10px">LIVE</span>
  <span><span style="color:var(--fg-muted); font-weight:600">BTC</span> <span style="color:var(--fg-default)">$112,842</span> <span style="color:var(--pump-mild)">+2.41%</span></span>
  <span><span style="color:var(--fg-muted); font-weight:600">ETH</span> <span style="color:var(--fg-default)">$4,221</span> <span style="color:var(--rekt-mild)">-0.64%</span></span>
  <span><span style="color:var(--fg-muted); font-weight:600">SOL</span> <span style="color:var(--fg-default)">$214.52</span> <span style="color:var(--pump-hot)">+6.12%</span></span>
  <span><span style="color:var(--fg-muted); font-weight:600">HYPE</span> <span style="color:var(--fg-default)">$38.21</span> <span style="color:var(--pump-nuclear)">+12.84%</span></span>
  <span><span style="color:var(--fg-muted); font-weight:600">BNB</span> <span style="color:var(--fg-default)">$712.44</span> <span style="color:var(--pump-mild)">+1.12%</span></span>
</div>
</div>
</body></html>
