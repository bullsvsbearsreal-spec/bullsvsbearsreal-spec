<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Head background -->
  <rect x="6" y="10" width="52" height="38" rx="12" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>

  <!-- Screen -->
  <rect x="12" y="16" width="40" height="26" rx="8" fill="#0A0A0A"/>

  <!-- Eyes -->
  <circle cx="26" cy="29" r="5" fill="#FFA500"/>
  <circle cx="26" cy="29" r="2.5" fill="#FFD700"/>
  <circle cx="26" cy="27" r="1.2" fill="white" opacity="0.5"/>

  <circle cx="38" cy="29" r="5" fill="#FFA500"/>
  <circle cx="38" cy="29" r="2.5" fill="#FFD700"/>
  <circle cx="38" cy="27" r="1.2" fill="white" opacity="0.5"/>

  <!-- Smile -->
  <path d="M28 35 Q32 38 36 35" stroke="#FFA500" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Antenna -->
  <line x1="32" y1="10" x2="32" y2="4" stroke="#444" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="3" r="3" fill="#FFA500"/>

  <!-- Body hint -->
  <rect x="18" y="48" width="28" height="12" rx="6" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <circle cx="32" cy="54" r="3" fill="#FFA500" opacity="0.6"/>

  <!-- Eye glow -->
  <circle cx="26" cy="29" r="7" fill="#FFA500" opacity="0.1"/>
  <circle cx="38" cy="29" r="7" fill="#FFA500" opacity="0.1"/>
</svg>
